repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.7.6
    hooks:
      - id: uv-lock

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.11.10
    hooks:
      # Run the linter.
      - id: ruff-check
      # Run the formatter.
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    # mypy version
    rev: v1.15.0 
    hooks:
    -   id: mypy
        args: [--strict, --ignore-missing-imports, --allow-untyped-decorators, "--config-file=./pyproject.toml"]
